<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hnhn</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ff6600" id="meta-theme">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── Base / HN theme (default) ── */
    body {
      font-family: Verdana, Geneva, sans-serif;
      background: #f6f6ef;
      color: #828282;
      font-size: 10pt;
    }

    header {
      background: #ff6600;
      padding: 4px 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header h1 { font-size: 14px; color: #000; font-weight: 700; }
    .header-sub { font-size: 10px; color: #000; opacity: 0.6; }
    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .refresh-btn, .theme-btn {
      background: none;
      border: none;
      color: #000;
      font-size: 12px;
      font-family: Verdana, Geneva, sans-serif;
      cursor: pointer;
      opacity: 0.6;
      padding: 2px 6px;
    }
    .refresh-btn:hover, .theme-btn:hover { opacity: 1; }

    #pull-indicator {
      text-align: center;
      font-size: 8pt;
      color: #828282;
      overflow: hidden;
      height: 0;
      transition: height 0.2s;
    }

    main { max-width: 85%; margin: 0 auto; }

    #status { padding: 5px 10px; color: #828282; font-size: 10pt; }
    #status:empty { display: none; }

    .item { padding: 6px 10px 6px 10px; border-bottom: 1px solid #e8e8e0; }

    .item-title-row { display: flex; align-items: baseline; gap: 6px; }
    .item-rank {
      color: #828282;
      font-size: 11pt;
      min-width: 32px;
      text-align: right;
      flex-shrink: 0;
    }
    .item-title a { font-size: 12pt; color: #000; text-decoration: none; }
    .item-title a:visited { color: #828282; }
    .item-title a:hover { text-decoration: underline; }
    .item-domain { font-size: 9pt; color: #828282; margin-left: 4px; }

    .item-quip {
      font-size: 9pt;
      color: #666;
      padding-left: 38px;
      padding-top: 4px;
      padding-bottom: 3px;
    }

    .item-summary {
      font-size: 9pt;
      color: #666;
      padding: 6px 10px;
      margin: 3px 0 3px 38px;
      background: #f0ead6;
      border-left: 2px solid #ff6600;
      line-height: 1.6;
    }

    .item-footer {
      padding-left: 38px;
      padding-bottom: 5px;
      padding-top: 2px;
      display: flex;
      align-items: baseline;
      gap: 12px;
    }
    .item-sub {
      font-size: 9pt;
      color: #828282;
      margin-left: auto;
      line-height: 1.6;
    }
    .item-sub a { color: #828282; text-decoration: none; }
    .item-sub a:hover { text-decoration: underline; }
    .item-sub .hl { color: #ff6600; font-weight: 700; }

    .expand-btn {
      background: none;
      border: none;
      color: #828282;
      font-size: 9pt;
      cursor: pointer;
      text-decoration: underline;
      padding: 0;
      font-family: Verdana, Geneva, sans-serif;
      display: none;
    }
    .expand-btn.visible { display: inline; }
    .expand-btn:hover { color: #ff6600; }

    .detail-content {
      display: none;
      margin-top: 8px;
      padding-left: 38px;
      padding-bottom: 4px;
    }
    .detail-content.open { display: block; }

    .discussion-section { margin-bottom: 12px; }
    .discussion-section h3 {
      font-size: 10pt;
      font-weight: 700;
      color: #000;
      margin-bottom: 3px;
    }
    .discussion-section p { font-size: 9pt; color: #666; line-height: 1.6; }

    .glossary {
      margin-top: 10px;
      padding: 8px 10px;
      background: #f0ead6;
      border: 1px solid #ddd;
    }
    .glossary h4 {
      font-size: 8pt;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #828282;
      margin-bottom: 5px;
    }
    .glossary-item { font-size: 9pt; color: #666; margin-bottom: 3px; }
    .glossary-item strong { color: #000; }

    .loading-detail { font-size: 9pt; color: #828282; padding: 5px 0; }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      body { font-size: 11pt; }
      main { max-width: 100%; }
      header { padding: 6px 10px; }
      header h1 { font-size: 15px; }
      .item { padding: 8px 8px 0 8px; }
      .item-rank { min-width: 24px; font-size: 11pt; }
      .item-title a { font-size: 12pt; line-height: 1.4; }
      .item-domain { font-size: 9pt; }
      .item-quip { font-size: 10pt; padding-left: 30px; }
      .item-footer { padding-left: 30px; flex-wrap: wrap; }
      .item-sub { font-size: 9pt; }
      .item-summary { font-size: 10pt; margin-left: 30px; padding: 6px 10px; line-height: 1.6; }
      .detail-content { padding-left: 30px; }
      .expand-btn { font-size: 9pt; padding: 6px 0; }
      .discussion-section h3 { font-size: 10pt; }
      .discussion-section p { font-size: 10pt; line-height: 1.6; }
      .glossary-item { font-size: 10pt; }
      .glossary h4 { font-size: 8pt; }
      .loading-detail { font-size: 10pt; }
    }

    /* ── Dark / newshacker theme ── */
    body.dark {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #0a0a0a;
      color: #999;
    }
    body.dark header {
      background: #141414;
      border-bottom: 1px solid #222;
    }
    body.dark header h1 { color: #ff6600; }
    body.dark .header-sub { color: #666; }
    body.dark .refresh-btn,
    body.dark .theme-btn { color: #888; }

    body.dark #pull-indicator { color: #666; }
    body.dark #status { color: #666; }

    body.dark .item { border-bottom-color: #1a1a1a; }
    body.dark .item-rank { color: #555; }
    body.dark .item-title a { color: #ddd; }
    body.dark .item-title a:visited { color: #888; }
    body.dark .item-domain { color: #555; }

    body.dark .item-sub { color: #666; }
    body.dark .item-sub a { color: #666; }
    body.dark .item-sub .hl { color: #ff6600; }

    body.dark .item-quip { color: #888; }

    body.dark .item-summary {
      background: #141414;
      border-left-color: #ff660060;
      color: #999;
    }

    body.dark .expand-btn { color: #666; }
    body.dark .expand-btn:hover { color: #ff6600; }

    body.dark .discussion-section h3 { color: #ff8c00; }
    body.dark .discussion-section p { color: #999; }

    body.dark .glossary {
      background: #111;
      border-color: #222;
    }
    body.dark .glossary h4 { color: #555; }
    body.dark .glossary-item { color: #888; }
    body.dark .glossary-item strong { color: #ccc; }

    body.dark .loading-detail { color: #555; }
  </style>
</head>
<body>
  <header>
    <h1>hnhn</h1>
    <span class="header-sub">+ AI summaries</span>
    <span class="header-right">
      <button class="theme-btn" id="theme-btn" title="Switch theme">◑ theme</button>
      <button class="refresh-btn" id="refresh-btn" title="Refresh">↻ refresh</button>
    </span>
  </header>

  <div id="pull-indicator">↓ release to refresh</div>
  <main>
    <div id="status">Loading...</div>
    <div id="stories"></div>
  </main>

  <script>
    const HN = "https://hacker-news.firebaseio.com/v0";
    const NH = "https://api.newshacker.me";
    const BATCH = 30;

    let allIds = [];
    let loaded = 0;
    let loading = false;
    const nhCache = {};

    // ── Theme ──
    function applyTheme(theme) {
      document.body.classList.toggle("dark", theme === "dark");
      document.getElementById("meta-theme").content = theme === "dark" ? "#141414" : "#ff6600";
      document.getElementById("theme-btn").textContent = theme === "dark" ? "◑ light" : "◑ dark";
      localStorage.setItem("hnhn-theme", theme);
    }
    applyTheme(localStorage.getItem("hnhn-theme") || "light");

    document.getElementById("theme-btn").addEventListener("click", () => {
      applyTheme(document.body.classList.contains("dark") ? "light" : "dark");
    });

    // ── Helpers ──
    function timeAgo(ts) {
      const diff = Math.floor(Date.now() / 1000) - ts;
      if (diff < 60) return `${diff}s ago`;
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
      return `${Math.floor(diff / 86400)}d ago`;
    }

    function domain(url) {
      if (!url) return null;
      try { return new URL(url).hostname.replace(/^www\./, ""); } catch { return null; }
    }

    function esc(s) {
      if (!s) return "";
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    // ── Data ──
    async function fetchHNItem(id) {
      const r = await fetch(`${HN}/item/${id}.json`);
      return r.json();
    }

    async function fetchNHItem(id) {
      if (nhCache[id] !== undefined) return nhCache[id];
      try {
        const r = await fetch(`${NH}/item/${id}`);
        if (!r.ok) { nhCache[id] = null; return null; }
        const data = await r.json();
        nhCache[id] = data;
        return data;
      } catch {
        nhCache[id] = null;
        return null;
      }
    }

    // ── Render ──
    function renderItem(hn, rank) {
      const d = domain(hn.url);
      const el = document.createElement("div");
      el.id = `item-${hn.id}`;
      el.innerHTML = `
        <div class="item">
          <div class="item-title-row">
            <span class="item-rank">${rank}.</span>
            <span class="item-title">
              <a href="${esc(hn.url || `https://news.ycombinator.com/item?id=${hn.id}`)}" target="_blank" rel="noopener">${esc(hn.title)}</a>${d ? `<span class="item-domain"> (${esc(d)})</span>` : ""}
            </span>
          </div>
          <div class="item-footer">
            <button class="expand-btn" data-id="${hn.id}">[show AI discussion summary]</button>
            <span class="item-sub">
              <span class="hl">${hn.score || 0}</span> points by <a href="https://news.ycombinator.com/user?id=${esc(hn.by)}" target="_blank">${esc(hn.by || "?")}</a> ${timeAgo(hn.time)} | <a href="https://news.ycombinator.com/item?id=${hn.id}" target="_blank"><span class="hl">${hn.descendants || 0}</span> comments</a>
            </span>
          </div>
          <div class="detail-content" id="detail-${hn.id}"></div>
        </div>`;
      return el;
    }

    function enrichItem(id, nh) {
      const el = document.getElementById(`item-${id}`);
      if (!el || !nh) return;

      const ai = nh.aisummary || nh.aiSummary || {};
      const context = ai.context || "";
      const quip = ai.sarcastic_question || "";

      if (quip) {
        const titleRow = el.querySelector(".item-title-row");
        if (titleRow && !el.querySelector(".item-quip")) {
          titleRow.insertAdjacentHTML("afterend",
            `<div class="item-quip">${esc(quip)}</div>`);
        }
      }

      if (context) {
        const footer = el.querySelector(".item-footer");
        if (footer && !el.querySelector(".item-summary")) {
          footer.insertAdjacentHTML("beforebegin",
            `<div class="item-summary">${esc(context)}</div>`);
        }
      }

      const expandBtn = el.querySelector(".expand-btn");
      if (expandBtn) expandBtn.classList.add("visible");
    }

    function renderDetail(data) {
      const ai = data.aisummary || data.aiSummary || {};
      const overview = ai.discussion_overview || [];
      const terms = ai.terminologies || [];

      if (!overview.length && !terms.length) {
        return `<p class="loading-detail">No discussion details available.</p>`;
      }

      let html = "";
      if (overview.length) {
        html += overview.map(s => `
          <div class="discussion-section">
            <h3>${esc(s.category)}</h3>
            <p>${esc(s.summary)}</p>
          </div>`).join("");
      }
      if (terms.length) {
        html += `<div class="glossary"><h4>Terms</h4>
          ${terms.map(g => `<div class="glossary-item"><strong>${esc(g.term)}:</strong> ${esc(g.explanation)}</div>`).join("")}
        </div>`;
      }
      return html;
    }

    // ── Load ──
    async function loadMore() {
      if (loading || loaded >= allIds.length) return;
      loading = true;
      const statusEl = document.getElementById("status");
      if (loaded === 0) statusEl.textContent = "Loading...";

      const batch = allIds.slice(loaded, loaded + BATCH);
      const hnItems = await Promise.all(batch.map(fetchHNItem));
      const container = document.getElementById("stories");

      hnItems.forEach((item, i) => {
        if (item && !item.deleted && !item.dead) {
          container.appendChild(renderItem(item, loaded + i + 1));
        }
      });

      loaded += batch.length;
      statusEl.textContent = "";
      loading = false;

      hnItems.forEach(item => {
        if (!item || item.deleted || item.dead) return;
        fetchNHItem(item.id).then(nh => {
          if (nh) enrichItem(item.id, nh);
        });
      });
    }

    // ── Expand ──
    document.getElementById("stories").addEventListener("click", async (e) => {
      const btn = e.target.closest(".expand-btn");
      if (!btn) return;
      const id = btn.dataset.id;
      const container = document.getElementById(`detail-${id}`);
      if (container.classList.contains("open")) {
        container.classList.remove("open");
        btn.textContent = "[show AI discussion summary]";
        return;
      }
      btn.textContent = "[loading...]";
      btn.disabled = true;
      try {
        const data = await fetchNHItem(id);
        if (data) {
          container.innerHTML = renderDetail(data);
        } else {
          container.innerHTML = `<p class="loading-detail">No AI summary available.</p>`;
        }
        container.classList.add("open");
        btn.textContent = "[hide AI discussion summary]";
      } catch {
        container.innerHTML = `<p class="loading-detail">Failed to load.</p>`;
        container.classList.add("open");
        btn.textContent = "[hide AI discussion summary]";
      }
      btn.disabled = false;
    });

    // ── Scroll ──
    window.addEventListener("scroll", () => {
      if (loaded < allIds.length && window.innerHeight + window.scrollY >= document.body.offsetHeight - 500) {
        loadMore();
      }
    });

    // ── Init ──
    (async () => {
      const r = await fetch(`${HN}/topstories.json`);
      allIds = await r.json();
      await loadMore();
    })();

    // ── Refresh ──
    async function refresh() {
      const btn = document.getElementById("refresh-btn");
      btn.textContent = "↻ ...";
      loaded = 0;
      allIds = [];
      document.getElementById("stories").innerHTML = "";
      const r = await fetch(`${HN}/topstories.json`);
      allIds = await r.json();
      await loadMore();
      btn.textContent = "↻ refresh";
    }

    document.getElementById("refresh-btn").addEventListener("click", refresh);

    // ── Pull-to-refresh ──
    let touchStartY = 0;
    let pulling = false;
    const pullEl = document.getElementById("pull-indicator");

    document.addEventListener("touchstart", (e) => {
      if (window.scrollY === 0) touchStartY = e.touches[0].clientY;
    }, { passive: true });

    document.addEventListener("touchmove", (e) => {
      if (touchStartY === 0) return;
      const dy = e.touches[0].clientY - touchStartY;
      if (dy > 0 && window.scrollY === 0) {
        pulling = true;
        const h = Math.min(dy * 0.4, 40);
        pullEl.style.height = h + "px";
        pullEl.textContent = h >= 35 ? "↓ release to refresh" : "↓ pull to refresh";
      }
    }, { passive: true });

    document.addEventListener("touchend", () => {
      if (pulling && parseInt(pullEl.style.height) >= 35) {
        pullEl.textContent = "refreshing...";
        pullEl.style.height = "24px";
        refresh().then(() => {
          pullEl.style.height = "0";
        });
      } else {
        pullEl.style.height = "0";
      }
      touchStartY = 0;
      pulling = false;
    });

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }
  </script>
</body>
</html>
